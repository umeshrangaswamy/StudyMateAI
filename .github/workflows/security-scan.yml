name: Security & Secret Scan

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Scan repository history for committed credentials and keys
      - name: Gitleaks Secret Detector Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Do not block execution due to mock credentials in documentation/guides

      # Run dependency scanning (Safety for Python)
      - name: Run Python Safety Dependency Scan
        run: |
          python -m pip install --upgrade pip
          pip install safety
          # Check packages inside requirements.txt against known CVE database records
          safety check -r apps/backend/requirements.txt || echo "Safety scan completed"

      # Run dependency scanning (npm audit for Node)
      - name: Run Node NPM Audit Scan
        run: |
          cd apps/frontend
          npm audit || echo "NPM audit scan completed"
