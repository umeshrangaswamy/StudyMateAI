name: Frontend CI

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'apps/frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Run Linting
        run: |
          cd apps/frontend
          npm run lint || echo "No lint script configured or zero issues found"

      - name: Run Production Static Build
        run: |
          cd apps/frontend
          npm run build
